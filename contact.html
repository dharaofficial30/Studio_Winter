<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- ── Preloader ─────────────────────────────────────────────── -->
<div id="preloader">
  <div class="loader-inner">
    <div class="loader-logo">W</div>
    <div class="loader-bar"></div>
  </div>
</div>

    
<!-- ── Mobile Nav ────────────────────────────────────────────── -->
<nav class="mobile-nav" aria-label="Mobile navigation">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="contact.html">Contact</a>
  <div class="nav-social">
    <a href="#">Instagram</a>
    <a href="#">Behance</a>
    <a href="#">LinkedIn</a>
  </div>
</nav>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<header id="navbar" role="banner">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">

      <!-- Logo -->
      <a href="index.html" class="navbar-brand">
        <div class="brand-mark">W</div>
        <span class="brand-text">Studio <span>Winter</span></span>
      </a>

      <!-- Desktop Nav -->
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <!-- CTA + Hamburger -->
      <div class="d-flex align-items-center gap-3">
        <a href="contact.html" class="btn-winter d-none d-lg-inline-flex">
          Start a Project <i class="bi bi-arrow-right btn-icon"></i>
        </a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </div>
</header>
  <section class="inner-banner">
    <div class="container text-center">
      <h1>Contact Us</h1>
    </div>
  </section>

  <section class="contact-page">
    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <form id="contactForm" class="contact-form">

            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Your Name" required>
            </div>

            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Your Email" required>
            </div>

            <div class="mb-3">
              <textarea rows="5" class="form-control" placeholder="Message"></textarea>
            </div>

            <button class="btn custom-btn w-100">
              Send Message
            </button>

          </form>

        </div>

      </div>

    </div>
  </section>

  <script src="script.js"></script>

</body>

</html>
